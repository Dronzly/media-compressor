<!DOCTYPE html>
<html>
<head>
<title>Media Tool</title>

<style>
:root {
    --bg: #ffffff;
    --text: #000000;
    --box: #f4f4f4;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg: #121212;
        --text: #ffffff;
        --box: #1e1e1e;
    }
}

body {
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    text-align: center;
    padding-top: 50px;
}

.container {
    background: var(--box);
    padding: 30px;
    border-radius: 10px;
    width: 400px;
    margin: auto;
}

input, button, select {
    margin: 10px;
    padding: 10px;
}

#previewContainer {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 15px;
}

.preview-item {
    width: 80px;
    height: 80px;
    position: relative;
    cursor: grab;
}

.preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
<h1>Media Tool by DRZ</h1>

<form id="uploadForm">
<input type="file" id="fileInput" multiple required><br>
<div id="previewContainer"></div>

<label>Quality: <span id="qualityValue">50</span></label><br>

<input type="range" id="qualitySlider" min="10" max="95" value="50"><br>
<input type="number" id="qualityInput" min="10" max="95" value="50"><br>

<select id="mode">
<option value="compress">Compress</option>
<option value="convert">Convert</option>
<option value="pdf">Image to PDF</option>
</select><br>

<select id="format">
<option value="jpg">Convert to JPG</option>
<option value="png">Convert to PNG</option>
</select><br>

<button type="submit" id="submitBtn">Compress</button>
</form>

<p id="result"></p>
<a id="downloadLink"></a>
</div>

<script>
const form = document.getElementById("uploadForm");
const fileInput = document.getElementById("fileInput");
const previewContainer = document.getElementById("previewContainer");
let fileList = [];
const result = document.getElementById("result");
const downloadLink = document.getElementById("downloadLink");

const modeSelect = document.getElementById("mode");
const formatSelect = document.getElementById("format");
const submitBtn = document.getElementById("submitBtn");

const slider = document.getElementById("qualitySlider");
const input = document.getElementById("qualityInput");
const valueText = document.getElementById("qualityValue");

function sync(val) {
    slider.value = val;
    input.value = val;
    valueText.innerText = val;
}

slider.oninput = () => sync(slider.value);
input.oninput = () => sync(input.value);

modeSelect.addEventListener("change", () => {
    const mode = modeSelect.value;

    const isConvert = mode === "convert";
    const isPDF = mode === "pdf";

    slider.disabled = isConvert || isPDF;
    input.disabled = isConvert || isPDF;
    formatSelect.disabled = !isConvert;

    if (isConvert) submitBtn.innerText = "Convert";
    else if (isPDF) submitBtn.innerText = "Create PDF";
    else submitBtn.innerText = "Compress";
});

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const files = fileList;
    const mode = modeSelect.value;
    const format = formatSelect.value;
    const quality = input.value;

    if (files.length === 0) return;

    result.innerText =
        mode === "pdf"
        ? "Creating PDF..."
        : mode === "convert"
        ? "Converting..."
        : "Compressing...";

    const formData = new FormData();

    for (let i = 0; i < files.length; i++) {
        formData.append("files", files[i]);
    }

    formData.append("mode", mode);

    if (mode === "compress") {
        formData.append("quality", quality);
    }

    if (mode === "convert") {
        formData.append("format", format);
    }

    const res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (mode === "compress") {
        result.innerText =
            `Original: ${data.original_size_kb} KB | Output: ${data.output_size_kb} KB`;
    } else if (mode === "convert") {
        result.innerText = "Conversion done";
    } else {
        result.innerText = "PDF created successfully";
    }

    downloadLink.href = `/download/${data.compressed_filename}`;
    downloadLink.innerText = "Download File";
});

const previewContainer = document.getElementById("previewContainer");

let fileList = [];

fileInput.addEventListener("change", () => {
    previewContainer.innerHTML = "";
    fileList = Array.from(fileInput.files);

    fileList.forEach((file, index) => {
        const div = document.createElement("div");
        div.classList.add("preview-item");
        div.draggable = true;
        div.dataset.index = index;

        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);

        div.appendChild(img);
        previewContainer.appendChild(div);
    });
});

let dragStartIndex;

previewContainer.addEventListener("dragstart", (e) => {
    dragStartIndex = e.target.closest(".preview-item").dataset.index;
});

previewContainer.addEventListener("dragover", (e) => {
    e.preventDefault();
});

previewContainer.addEventListener("drop", (e) => {
    const target = e.target.closest(".preview-item");
    if (!target) return;

    const dragEndIndex = target.dataset.index;

    // swap
    [fileList[dragStartIndex], fileList[dragEndIndex]] =
    [fileList[dragEndIndex], fileList[dragStartIndex]];

    updatePreview();
});

function updatePreview() {
    previewContainer.innerHTML = "";

    fileList.forEach((file, index) => {
        const div = document.createElement("div");
        div.classList.add("preview-item");
        div.draggable = true;
        div.dataset.index = index;

        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);

        div.appendChild(img);
        previewContainer.appendChild(div);
    });
}


</script>

</body>
</html>
