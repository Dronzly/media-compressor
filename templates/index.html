<!DOCTYPE html>
<html>
<head>
    <title>Media Tool</title>
</head>

<body>

<h2>Media Tool</h2>

<form id="uploadForm">
    <input type="file" id="fileInput" multiple required><br>

    <label>Quality: <span id="qualityValue">50</span></label><br>
    <input type="range" id="qualitySlider" min="10" max="95" value="50"><br>
    <input type="number" id="qualityInput" min="10" max="95" value="50"><br>

    <select id="mode">
        <option value="compress">Compress</option>
        <option value="convert">Convert</option>
        <option value="pdf">Image to PDF</option>
    </select><br>

    <select id="format">
        <option value="jpg">Convert to JPG</option>
        <option value="png">Convert to PNG</option>
    </select><br>

    <button type="submit" id="submitBtn">Compress</button>
</form>

<p id="result"></p>
<a id="downloadLink"></a>

<script>
const form = document.getElementById("uploadForm");
const fileInput = document.getElementById("fileInput");
const result = document.getElementById("result");
const downloadLink = document.getElementById("downloadLink");

const modeSelect = document.getElementById("mode");
const formatSelect = document.getElementById("format");
const submitBtn = document.getElementById("submitBtn");

const slider = document.getElementById("qualitySlider");
const input = document.getElementById("qualityInput");
const valueText = document.getElementById("qualityValue");

function sync(val) {
    slider.value = val;
    input.value = val;
    valueText.innerText = val;
}

slider.oninput = () => sync(slider.value);
input.oninput = () => sync(input.value);

modeSelect.addEventListener("change", () => {
    const mode = modeSelect.value;

    const isConvert = mode === "convert";
    const isPDF = mode === "pdf";

    slider.disabled = isConvert || isPDF;
    input.disabled = isConvert || isPDF;
    formatSelect.disabled = !isConvert;

    if (isConvert) submitBtn.innerText = "Convert";
    else if (isPDF) submitBtn.innerText = "Create PDF";
    else submitBtn.innerText = "Compress";
});

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const files = fileInput.files;
    const mode = modeSelect.value;
    const format = formatSelect.value;
    const quality = input.value;

    if (files.length === 0) return;

    result.innerText =
        mode === "pdf"
            ? "Creating PDF..."
            : mode === "convert"
            ? "Converting..."
            : "Compressing...";

    const formData = new FormData();

    for (let i = 0; i < files.length; i++) {
        formData.append("files", files[i]);
    }

    formData.append("mode", mode);

    if (mode === "compress") {
        formData.append("quality", quality);
    }

    if (mode === "convert") {
        formData.append("format", format);
    }

    const res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (mode === "compress") {
        result.innerText =
            `Original: ${data.original_size_kb} KB | Output: ${data.output_size_kb} KB`;
    } else if (mode === "convert") {
        result.innerText = "Conversion done";
    } else {
        result.innerText = "PDF created successfully";
    }

    downloadLink.href = `/download/${data.compressed_filename}`;
    downloadLink.innerText = "Download File";
});
</script>

</body>
</html>
