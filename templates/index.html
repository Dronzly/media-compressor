<!DOCTYPE html>
<html>
<head>
    <title>Media Compressor</title>
    <style>

:root {
    --bg: #f4f4f4;
    --text: #000;
    --card: white;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg: #121212;
        --text: #ffffff;
        --card: #1e1e1e;
    }
}
        body {
            font-family: Arial;
	    background: var(--bg);
    	    color: var(--text);
            text-align: center;
            padding-top: 50px;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input, button, select {
            margin: 10px;
            padding: 10px;
        }

        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        #dropZone {
	    border: 2px dashed var(--text);
            padding: 20px;
            margin-bottom: 15px;
        }

        #preview {
            max-width: 100%;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Media Compression/Tool By DRZ</h1>

    <div id="dropZone">Drag & Drop Image Here</div>

    <form id="uploadForm">
        <input type="file" id="fileInput" required><br>

        <label>Quality: <span id="qualityValue">50</span></label><br>

        <input type="range" id="qualitySlider" min="10" max="95" value="50"><br>
        <input type="number" id="qualityInput" min="10" max="95" value="50"><br>

<select id="mode">
    <option value="compress">Compress</option>
    <option value="convert">Convert</option>
    <option value="pdf">Image to PDF</option>
</select>

        <select id="format">
            <option value="jpg">Convert to JPG</option>
            <option value="png">Convert to PNG</option>
        </select><br>

        <button type="submit" id="submitBtn">Compress</button>
    </form>

    <img id="preview">
    <p id="result"></p>
    <a id="downloadLink"></a>
</div>

<script>
const form = document.getElementById("uploadForm");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const result = document.getElementById("result");
const downloadLink = document.getElementById("downloadLink");

const modeSelect = document.getElementById("mode");
const formatSelect = document.getElementById("format");
const submitBtn = document.getElementById("submitBtn");

const slider = document.getElementById("qualitySlider");
const input = document.getElementById("qualityInput");
const valueText = document.getElementById("qualityValue");

// Sync quality
function sync(val) {
    slider.value = val;
    input.value = val;
    valueText.innerText = val;
}

slider.oninput = () => sync(slider.value);
input.oninput = () => sync(input.value);

// Mode switching
modeSelect.addEventListener("change", () => {
    const mode = modeSelect.value;

    const isConvert = mode === "convert";
    const isPDF = mode === "pdf";

    slider.disabled = isConvert || isPDF;
    input.disabled = isConvert || isPDF;
    formatSelect.disabled = !isConvert;

    if (isConvert) submitBtn.innerText = "Convert";
    else if (isPDF) submitBtn.innerText = "Convert to PDF";
    else submitBtn.innerText = "Compress";
});

// Preview
fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
});

// Submit
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const file = fileInput.files[0];
    const mode = modeSelect.value;
    const format = formatSelect.value;
    const quality = input.value;

    if (!file) return;

    result.innerText = mode === "convert"
        ? "Converting..."
        : "Compressing...";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("mode", mode);

    if (mode === "compress") {
        formData.append("quality", quality);
    } else {
        formData.append("format", format);
    }

    const res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

if (mode === "compress") {
    result.innerText =
        `Original: ${data.original_size_kb} KB | Output: ${data.output_size_kb} KB`;
} else if (mode === "convert") {
    result.innerText = "Conversion completed";
} else {
    result.innerText = "PDF created successfully";
}
    downloadLink.href = `/download/${data.compressed_filename}`;
    downloadLink.innerText = "Download File";
});
</script>

</body>
</html>
