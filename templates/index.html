	<!DOCTYPE html>
<html>
<head>
<title>Media Tool</title>

<style>
:root {
    --bg: #ffffff;
    --text: #000000;
    --box: #f4f4f4;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg: #121212;
        --text: #ffffff;
        --box: #1e1e1e;
    }
}

body {
    font-family: Arial;
    background: var(--bg);
    color: var(--text);
    text-align: center;
    padding-top: 50px;
}

.container {
    background: var(--box);
    padding: 30px;
    border-radius: 10px;
    width: 400px;
    margin: auto;
}

input, button, select {
    margin: 10px;
    padding: 10px;
}

#previewContainer {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 15px;
}

.preview-item {
    width: 80px;
    height: 80px;
    cursor: grab;
}

.preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 8px;
}

.preview-item {
    width: 80px;
    height: 80px;
    cursor: grab;
    position: relative; /* IMPORTANT */
}

.preview-number {
    position: absolute;
    top: 4px;
    left: 4px;
    background: rgba(0,0,0,0.7);
    color: white;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 5px;
}

.remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: red;
    color: white;
    border: none;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 12px;
    cursor: pointer;
    line-height: 16px;
    text-align: center;
}

</style>
</head>

<body>

<div class="container">
<h1>Media Tool by DRZ</h1>

<form id="uploadForm">
<input type="file" id="fileInput" multiple required>
<div id="previewContainer"></div>

<label>Quality: <span id="qualityValue">50</span></label><br>

<input type="range" id="qualitySlider" min="10" max="95" value="50"><br>
<input type="number" id="qualityInput" min="10" max="95" value="50"><br>

<select id="mode">
<option value="compress">Compress</option>
<option value="convert">Convert</option>
<option value="pdf">Image to PDF</option>
</select><br>

<select id="format">
<option value="jpg">Convert to JPG</option>
<option value="png">Convert to PNG</option>
</select><br>

<button type="submit" id="submitBtn">Compress</button>
</form>

<p id="result"></p>
<a id="downloadLink"></a>
</div>

<script>
const form = document.getElementById("uploadForm");
const fileInput = document.getElementById("fileInput");
const previewContainer = document.getElementById("previewContainer");
const result = document.getElementById("result");
const downloadLink = document.getElementById("downloadLink");

const modeSelect = document.getElementById("mode");
const formatSelect = document.getElementById("format");
const submitBtn = document.getElementById("submitBtn");

const slider = document.getElementById("qualitySlider");
const input = document.getElementById("qualityInput");
const valueText = document.getElementById("qualityValue");

let fileList = [];
let dragStartIndex = null;

// 🔧 Sync quality
function sync(val) {
    slider.value = val;
    input.value = val;
    valueText.innerText = val;
}
slider.oninput = () => sync(slider.value);
input.oninput = () => sync(input.value);

// 🔧 Mode switch
modeSelect.addEventListener("change", () => {
    const mode = modeSelect.value;

    slider.disabled = (mode !== "compress");
    input.disabled = (mode !== "compress");
    formatSelect.disabled = (mode !== "convert");

    submitBtn.innerText =
        mode === "pdf" ? "Create PDF" :
        mode === "convert" ? "Convert" :
        "Compress";
});

// 🔥 FILE SELECT → SHOW PREVIEW
fileInput.addEventListener("change", () => {
    fileList = Array.from(fileInput.files);
    updatePreview();
});

// 🔥 RENDER PREVIEW
function updatePreview() {
    previewContainer.innerHTML = "";

    fileList.forEach((file, index) => {
        const div = document.createElement("div");
        div.className = "preview-item";
        div.draggable = true;
        div.dataset.index = index;

        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);

        // 🔢 Number
        const number = document.createElement("div");
        number.className = "preview-number";
        number.innerText = index + 1;

        // ❌ Remove button
        const removeBtn = document.createElement("button");
        removeBtn.className = "remove-btn";
        removeBtn.innerText = "×";

        removeBtn.onclick = (e) => {
            e.stopPropagation(); // prevent drag conflict
            fileList.splice(index, 1);
            updatePreview();
        };

        div.appendChild(img);
        div.appendChild(number);
        div.appendChild(removeBtn);

        previewContainer.appendChild(div);
    });
}

// 🔥 DRAG START
previewContainer.addEventListener("dragstart", (e) => {
    const item = e.target.closest(".preview-item");
    if (!item) return;
    dragStartIndex = item.dataset.index;
});

// 🔥 DRAG OVER
previewContainer.addEventListener("dragover", (e) => {
    e.preventDefault();
});

// 🔥 DROP → REORDER
previewContainer.addEventListener("drop", (e) => {
    const item = e.target.closest(".preview-item");
    if (!item) return;

    const dragEndIndex = item.dataset.index;

    [fileList[dragStartIndex], fileList[dragEndIndex]] =
    [fileList[dragEndIndex], fileList[dragStartIndex]];

    updatePreview();
});

// 🔥 SUBMIT
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    if (fileList.length === 0) return;

    const mode = modeSelect.value;
    const format = formatSelect.value;
    const quality = input.value;

    result.innerText =
        mode === "pdf" ? "Creating PDF..." :
        mode === "convert" ? "Converting..." :
        "Compressing...";

    const formData = new FormData();

    fileList.forEach(file => {
        formData.append("files", file);
    });

    formData.append("mode", mode);

    if (mode === "compress") {
        formData.append("quality", quality);
    }

    if (mode === "convert") {
        formData.append("format", format);
    }

    const res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    result.innerText =
        mode === "pdf" ? "PDF created successfully" :
        mode === "convert" ? "Conversion done" :
        `Original: ${data.original_size_kb} KB | Output: ${data.output_size_kb} KB`;

    downloadLink.href = `/download/${data.compressed_filename}`;
    downloadLink.innerText = "Download File";
});
</script>

</body>
</html>
